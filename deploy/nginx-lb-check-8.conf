pid        /root/http-server/http-server/deploy/nginx-lb-check-8.pid;
error_log  /root/http-server/http-server/deploy/nginx-lb-check-8.error.log;

worker_processes 8;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    access_log off;

    upstream simple_http_backend {
        least_conn;
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
        server 127.0.0.1:8083;
        server 127.0.0.1:8084;
        server 127.0.0.1:8085;
        server 127.0.0.1:8086;
        server 127.0.0.1:8087;
        server 127.0.0.1:8088;
        keepalive 256;
    }

    server {
        listen 8090 reuseport;
        location / {
            proxy_pass http://simple_http_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
