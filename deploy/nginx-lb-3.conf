# 3 台 backend 模拟（本机 8081/8082/8083）+ 故障转移演示
pid        /root/http-server/http-server/deploy/nginx-3.pid;
error_log  /root/http-server/http-server/deploy/nginx-3-error.log;

worker_processes 8;
worker_rlimit_nofile 1048576;

events {
    use epoll;
    multi_accept on;
    worker_connections 102400;
}

http {
    access_log off;

    upstream backend_group {
        least_conn;
        server 127.0.0.1:8081 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:8082 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:8083 max_fails=2 fail_timeout=10s;
        keepalive 256;
    }

    server {
        listen 8090 reuseport;
        server_name localhost;

        location / {
            proxy_pass http://backend_group;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            add_header X-Backend-Addr $upstream_addr always;
        }
    }
}
