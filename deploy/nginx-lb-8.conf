# 8 backend + Nginx LB（优化版）
# - least_conn：按连接数均衡
# - keepalive 1024：Nginx→backend 长连接池
# - listen reuseport：8 worker 均匀 accept
pid        /root/http-server/http-server/deploy/nginx-8.pid;
error_log  /root/http-server/http-server/deploy/nginx-8-error.log;

worker_processes 8;
worker_rlimit_nofile 1048576;

events {
    use epoll;
    multi_accept on;
    worker_connections 102400;
}

http {
    access_log off;

    upstream backend_group {
        least_conn;
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
        server 127.0.0.1:8083;
        server 127.0.0.1:8084;
        server 127.0.0.1:8085;
        server 127.0.0.1:8086;
        server 127.0.0.1:8087;
        server 127.0.0.1:8088;
        keepalive 1024;
    }

    server {
        listen 8090 reuseport;
        server_name localhost;

        location / {
            proxy_pass http://backend_group;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
